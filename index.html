<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Alix-MOD</title>

<style>
body {
    margin:0;
    font-family: Arial;
    background:#f5f5f5;
}

/* HEADER */
header {
    background:#fff;
    padding:15px;
    text-align:center;
    border-bottom:1px solid #ddd;
}

h1 {
    margin:0;
}

/* VIDEO */
.video {
    text-align:center;
    padding:20px;
    background:white;
    margin:20px;
    border-radius:10px;
}

.video iframe {
    width:90%;
    max-width:800px;
    height:400px;
    border:none;
}

/* CARDS */
.container {
    padding:30px;
}

.platforms {
    display:flex;
    justify-content:center;
    gap:20px;
    flex-wrap:wrap;
}

.card {
    background:white;
    border:1px solid #ddd;
    border-radius:12px;
    width:220px;
    padding:20px;
    text-align:center;
}

.card img {
    width:80px;
}

button {
    margin-top:10px;
    padding:10px;
    width:100%;
    background:#ffa41c;
    border:none;
    border-radius:8px;
    cursor:pointer;
}

/* PAYMENT PAGE */
#paymentPage {
    display:none;
    text-align:center;
    padding:30px;
}

.pay-options {
    display:flex;
    justify-content:center;
    gap:20px;
    flex-wrap:wrap;
    margin-top:20px;
}

.pay-card {
    background:white;
    border:1px solid #ddd;
    padding:15px;
    width:160px;
    text-align:center;
    border-radius:12px;
}

.pay-card img {
    width:70px;
    height:70px;
    object-fit:contain;
}

.back-btn {
    margin-top:20px;
    padding:10px;
    width:200px;
    background:#ddd;
    border:none;
    border-radius:8px;
    cursor:pointer;
}
</style>
</head>

<body>

<header>
    <h1>Alix-MOD</h1>
</header>

<!-- VIDEO -->
<div class="video">
    <iframe src="https://www.youtube.com/embed/X56Y64Lr3mg"></iframe>
</div>

<!-- STORE -->
<div id="mainPage">

<div class="container">
    <div class="platforms">

        <div class="card">
            <img src="https://upload.wikimedia.org/wikipedia/commons/f/fa/Apple_logo_black.svg">
            <h3>iOS</h3>
            <button onclick="openPay('iOS')">Select</button>
        </div>

        <div class="card">
            <img src="https://upload.wikimedia.org/wikipedia/commons/d/d7/Android_robot.svg">
            <h3>Android</h3>
            <button onclick="openPay('Android')">Select</button>
        </div>

        <div class="card">
            <img src="https://cdn-icons-png.flaticon.com/512/1006/1006363.png">
            <h3>Computer</h3>
            <button onclick="openPay('Computer')">Select</button>
        </div>

    </div>
</div>

</div>

<!-- PAYMENT PAGE -->
<div id="paymentPage">

    <h2 id="deviceTitle"></h2>

    <h3>Choose Payment Method</h3>

    <div class="pay-options">

        <!-- PayPal -->
        <div class="pay-card">
            <img src="https://cdn-icons-png.flaticon.com/512/196/196566.png">
            <p>PayPal ($5)</p>
            <button onclick="pay('paypal')">Pay</button>
        </div>

        <!-- USDT -->
        <div class="pay-card">
            <img src="https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcQYXtVSSiw-oOmMhxlC1RWE_jowqLPjA3XBwtNKW6j8lg&s=10">
            <p>USDT (BEP20) $4</p>
            <button onclick="pay('usdt')">Pay</button>
        </div>

        <!-- Wise -->
        <div class="pay-card">
            <img src="https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcQT_jv45R6IfJ-tUpSM_wiZuIQvCyjfex-a7dplE23cfA&s=10">
            <p>Wise ($4)</p>
            <button onclick="pay('wise')">Pay</button>
        </div>

    </div>

    <button class="back-btn" onclick="back()">⬅ Back</button>

</div>

<script>

let device = "";

function openPay(name){
    device = name;

    document.getElementById("mainPage").style.display = "none";
    document.getElementById("paymentPage").style.display = "block";

    document.getElementById("deviceTitle").innerText = "Payment for " + device;
}

function back(){
    document.getElementById("paymentPage").style.display = "none";
    document.getElementById("mainPage").style.display = "block";
}

function pay(method){

    if(method === "paypal"){
        let confirmPay = confirm("PayPal Payment $5 - Continue?");
        if(confirmPay){
            window.location.href = "https://www.paypal.me/YOURNAME/5";
        }
    }

    if(method === "usdt"){
        alert(
`USDT (BEP20)

Price: $4
Network: BSC (BEP20)

Address:
0x461622008b961d7b9210c7b0f9c5f38ecbe5c985`
        );
    }

    if(method === "wise"){
        alert(
`Wise Payment

Price: $4

Send to Wise account:
YOUR_EMAIL`
        );
    }

}

</script>

</body>
</html>
